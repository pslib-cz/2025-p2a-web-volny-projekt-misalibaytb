[component:project-card;*type,name,description,&tags,*tags-area-label]
<li class="project-card">
    <div class="project-card__status-bar"></div>
    <p class="project-card__status">Planned</p>
    <h3 class="project-card__title">{name}</h3>
    <p class="project-card__description">{description}</p>
    <ul class="project-card__tags" [tags-area-label]>
        {tags}
    </ul>
</li>
(type=live)
<li class="project-card live">
    <div class="project-card__status-bar"></div>
    <p class="project-card__status">Live</p>
    <h3 class="project-card__title">{name}</h3>
    <p class="project-card__description">{description}</p>
    <ul class="project-card__tags" [tags-area-label]>
        {tags}
    </ul>
</li>
(type=inprogress)
<li class="project-card inprogress">
    <div class="project-card__status-bar"></div>
    <p class="project-card__status">In Progress</p>
    <h3 class="project-card__title">{name}</h3>
    <p class="project-card__description">{description}</p>
    <ul class="project-card__tags" [tags-area-label]>
        {tags}
    </ul>
</li>
