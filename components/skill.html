[component:skill-slider;value,name,icon]
<li class="skill-slider">
    <div class="skill-slider__top">
        <h3 class="skill-slider__title">
            <i aria-hidden="true" class="skill-slider__icon {icon}"></i>
            <span class="skill-slider__name">{name}</span>
        </h3>
        <strong class="skill-slider__value">{value}%</strong>
    </div>
    <meter class="skill-slider__bar" min="0" max="100" value="{value}">
        {value}%
    </meter>
</li>
