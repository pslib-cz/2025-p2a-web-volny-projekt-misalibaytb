[component:skill-slider;value,name,icon]
<div class="skill-slider">
    <div class="skill-slider__top">
        <div class="skill-slider__title">
            <i class="skill-slider__icon {icon}"></i>
            <p class="skill-slider__name">{name}</p>
        </div>
        <strong class="skill-slider__value">{value}</strong>
    </div>
    <div class="skill-slider__bar">
        <div class="skill-slider__fill" style="--percentage: {value};"></div>
    </div>
</div>
