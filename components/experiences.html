[component:experience-card;type,&value,name,time,icon]
<article class="experiencecard">
    <i class="{icon}"></i>
    <div class="content">
        <p class="name">{name}</p>
        <strong>{value}</strong>
        <p class="time">{time}</p>
    </div>
</article>
(type=dead)
<article class="experiencecard inactive">
    <i class="{icon}"></i>
    <div class="content">
        <p class="name">{name}</p>
        <strong>{value}</strong>
        <p class="time">{time}</p>
    </div>
</article>
